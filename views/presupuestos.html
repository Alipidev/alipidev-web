<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Portfolio Alina Puscas">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Alipidev</title>
</head>
<body>
    <header>
        <!-- Encabezado de la página web -->
        <div class="header-container">
            <h1><a href="../index.html" class="logo-text">Alipi<span>dev</span></a></h1>
        </div>
        <!-- Navegador -->
        <nav class="navbar">
            <ul>
                <li>
                    <a href="../index.html">Inicio</a>
                </li>
                <li>
                    <a href="portfolio.html">Portfolio</a>
                </li>
                <li>
                    <a href="presupuestos.html" class="active">Presupuestos</a>
                </li>
                <li>
                    <a href="contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>

    <!-- MAIN contenido principal de la página web -->
    <main>
        <section class="section-presupuesto">
            <h2>Solicitud de presupuesto</h2>
        <form action="#" method="post">
            <fieldset>
                <legend>Datos Personales</legend>

                <label for="name">Nombre</label>
                <input type="text" name="name"  id="name" placeholder="Introduzca su nombre" required>

                <label for="correo">Correo electrónico</label>
                <input type="email" name="correo" id="correo" placeholder="Introduzca su correo electrónico" required>

                <label for="phone">Teléfono móvil</label>
                <input type="tel" name="phone" id="phone" placeholder="Introduzca su número de móvil" required>

                <label for="comentario">Solicite más información</label>
                <textarea name="comentario" id="comentario" rows="5" placeholder="Cuéntanos más sobre tu proyecto..." required></textarea>

                <div class="checkbox-container">
                    <input type="checkbox" name="politica" id="politica" required>
                    <label for="politica">Acepto la <strong>Política de Privacidad</strong></label>
                </div>
                <button type="submit" class="btn-enviar">Enviar Solicitud</button>
            </fieldset>
        </form>
        </section>
    </main>
    <!-- FOOTER pie de página -->
    <footer>
        <!-- Iconos de redes sociales -->
        <div class="footer-social">
            <h4>Síguenos</h4>
            <div class="social-icons">
                <a href="https://facebook.com" target="_blank" aria-label="Facebook">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://instagram.com" target="_blank" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://github.com" target="_blank" aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>

        <!-- Dirección de la empresa -->
         <div class="footer-address">
            <h4>Nuestra sede</h4>
            <address>
                Carretera Malilla <br>
                46026 Valencia, España
            </address>
         </div>
        <!-- Aviso legal -->
         <div class="footer-content">
            <p>&copy; 2026 Alipidev. Todos los derechos reservados</p>
            <a href="aviso-legal.html">Aviso Legal</a>
         </div>
     </footer>
</body>
</html>
